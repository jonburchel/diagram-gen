entUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#005A9E" stop-opacity="1"/><stop offset="100%" stop-color="#D2D0CE" stop-opacity="1"/></linearGradient><text text-anchor="middle" x="415.3046875" y="-25" class="flowchartTitleText">DR Series Navigation</text><style>/* Microsoft Fluent-inspired Mermaid styles */

/* Base text styling */
.nodeLabel, .edgeLabel, .cluster-label, .flowchartTitleText {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif !important;
}

.flowchartTitleText {
  font-size: 18px !important;
  font-weight: 600 !important;
  fill: #323130 !important;
}

/* Node hover effects */
.node rect, .node polygon, .node circle, .node ellipse {
  transition: filter 0.2s ease;
}

/* Subgraph/cluster styling */
.cluster rect {
  rx: 8 !important;
  ry: 8 !important;
  stroke-width: 1.5px !important;
}

.cluster-label .nodeLabel {
  font-weight: 600 !important;
  font-size: 13px !important;
  fill: #605E5C !important;
}

/* Edge labels */
.edgeLabel {
  font-size: 12px !important;
  background-color: #FFFFFF !important;
  padding: 2px 6px !important;
}

/* Sequence diagram actor boxes */
.actor {
  stroke: #005A9E !important;
  stroke-width: 2px !important;
  fill: #0078D4 !important;
}

.actor text {
  fill: #FFFFFF !important;
  font-weight: 600 !important;
}

/* Note boxes in sequence diagrams */
.note {
  fill: #FFF4CE !important;
  stroke: #FFB900 !important;
}

.noteText {
  fill: #323130 !important;
}
</style></svg>